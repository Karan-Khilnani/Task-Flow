{% extends 'base.html' %}
{% block title %}| Register{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Create account ✨</h2>
    <p class="subtitle">Start organizing your tasks today</p>

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password1" placeholder="Create password" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="password2" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary form-full">
        <i class="fa-solid fa-user-plus"></i> Register
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Login</a>
    </p>
  </div>
</div>
{% endblock %}
